<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liverpool Fan Shop – Checkout</title>
    <link id="favicon" rel="icon" href="Liverpool-FC-80s-icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <!-- ADD PIXEL BASE CODE HERE -->

</head>
<body>
    <header>
        <nav>
            <a class="nav-brand" href="index.html">
                <img src="Liverpool-FC-80s-icon.png" alt="LFC">
                Liverpool Fan Shop
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart <span class="nav-cart-badge" id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Checkout</h1>
        <div class="checkout-container">

            <!-- Shipping / Contact Form -->
            <div class="form-card">
                <h2>Shipping Information</h2>
                <form id="checkout-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" value="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" value="johndoe@example.com">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="address">Street Address</label>
                        <input type="text" id="address" value="123 Main St">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" value="Anytown">
                        </div>
                        <div class="form-group">
                            <label for="state">State</label>
                            <input type="text" id="state" value="CA">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="zip">ZIP Code</label>
                        <input type="text" id="zip" value="12345">
                    </div>
                    <!-- Purchase addEventListener is wired in script.js -->
                    <button id="purchase-btn" type="button" class="btn-purchase">
                        Complete Purchase
                    </button>
                </form>
            </div>

            <!-- Order Summary -->
            <div class="summary-card">
                <h2>Order Summary</h2>
                <table id="cart-summary-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="cart-summary-body"></tbody>
                </table>
                <div class="summary-total">
                    <span>Total</span>
                    <span>$<span id="cart-total">0.00</span></span>
                </div>
            </div>

        </div>
    </main>

    <footer>
        &copy; 2025 Liverpool Fan Shop &mdash; Demo site for Meta Pixel Setup
    </footer>

    <script src="script.js"></script>
</body>
</html>
