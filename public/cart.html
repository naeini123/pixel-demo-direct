<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liverpool Fan Shop – Cart</title>
    <link id="favicon" rel="icon" href="Liverpool-FC-80s-icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">

    <!-- ============================================================
         META PIXEL BASE CODE
         TODO: Replace YOUR_PIXEL_ID with your actual Pixel ID
         ============================================================ -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window,document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', 'YOUR_PIXEL_ID');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=YOUR_PIXEL_ID&ev=PageView&noscript=1"/></noscript>
    <!-- END META PIXEL BASE CODE -->

</head>
<body>
    <header>
        <nav>
            <a class="nav-brand" href="index.html">
                <img src="Liverpool-FC-80s-icon.png" alt="LFC">
                Liverpool Fan Shop
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart <span class="nav-cart-badge" id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1 class="page-title">Your Cart</h1>
        <div class="cart-wrapper">
            <table id="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cart-body"></tbody>
            </table>
            <div class="cart-footer">
                <p class="cart-total">Order Total: $<span id="cart-total">0.00</span></p>
                <!-- InitiateCheckout addEventListener is wired in script.js -->
                <button class="btn-checkout" id="checkout-btn">Proceed to Checkout &rarr;</button>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2025 Liverpool Fan Shop &mdash; Demo site for Meta Pixel Setup
    </footer>

    <script src="script.js"></script>
</body>
</html>
